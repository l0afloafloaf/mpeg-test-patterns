<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPEG test patterns</title>
    <script src="videos.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .collage-container {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            grid-auto-flow: dense;
            gap: 4px;
            padding: 4px;
        }
        .tile {
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .tile.giant {
            grid-column: span 2;
            grid-row: span 2;
        }
        .tile.giant-nine {
            grid-column: span 3;
            grid-row: span 3;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>
<body>

    <div class="collage-container" id="grid"></div>

    <script>
        const gridContainer = document.getElementById('grid');
        let allTiles = []; 
        
        const maxTilesUniform = 12;
        
        // --- PROBABILITY CONFIGURATION ---
        let changeCounter = 0;
        const triggerEveryXChanges = 15; 
        const giantLayoutChance = 0.7;   
        const nineCellTakeoverChance = 0.1; 
        const echoTakeoverChance = 0.3; 
        
        let wasLastLayoutGiant = false;
        let lastGiantIndex = -1;
        
        let pendingLayoutChange = null; 

        function getRandomVideo() {
            const randomIndex = Math.floor(Math.random() * videoSourcePool.length); return 'videos/' + videoSourcePool[randomIndex];
            }

        function createTileElement() {
            const tile = document.createElement('div');
            tile.className = 'tile';
            
            const video = document.createElement('video');
            video.muted = true;
            video.autoplay = true;
            video.playsInline = true;
            
            video.src = getRandomVideo();
            let loopCounter = 1;

            video.addEventListener('loadedmetadata', function() {
                const randomStart = Math.random() * Math.min(5, this.duration);
                this.currentTime = randomStart;
            }, { once: true });

            video.addEventListener('ended', function() {
                if (this.duration < 5.0) {
                    let shouldLoop = false;
                    if (loopCounter === 1 && Math.random() < 0.90) shouldLoop = true; 
                    else if (loopCounter === 2 && Math.random() < 0.70) shouldLoop = true; 
                    else if (loopCounter === 3 && Math.random() < 0.50) shouldLoop = true; 
                    else if (loopCounter === 4 && Math.random() < 0.30) shouldLoop = true; 

                    if (shouldLoop) {
                        loopCounter++;
                        this.currentTime = 0; 
                        this.play().catch(() => {});
                        return; 
                    }
                }

                loopCounter = 1;

                if (tile.dataset.pendingEchoSrc) {
                    this.src = tile.dataset.pendingEchoSrc;
                    delete tile.dataset.pendingEchoSrc;
                } else {
                    this.src = getRandomVideo();
                }
                this.play().catch(e => console.log("Playback error:", e));

                changeCounter++;
                if (changeCounter >= triggerEveryXChanges) {
                    changeCounter = 0; 
                    generateNextLayoutAction(); 
                }

                if (pendingLayoutChange) {
                    executeQueuedLayout(pendingLayoutChange);
                    pendingLayoutChange = null; 
                }
            });

            tile.appendChild(video);
            return tile;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function generateNextLayoutAction() {
            if (Math.random() < echoTakeoverChance) {
                pendingLayoutChange = { type: 'ECHO', echoSrc: getRandomVideo() };
            } else if (Math.random() < giantLayoutChance) {
                if (Math.random() < nineCellTakeoverChance) {
                    pendingLayoutChange = { type: 'GIANT_NINE' }; 
                } else {
                    pendingLayoutChange = { type: 'GIANT_2X2' };
                }
            } else {
                pendingLayoutChange = { type: 'RESET_UNIFORM' };
            }
        }

        function executeQueuedLayout(action) {
            allTiles.forEach(tile => {
                tile.classList.remove('giant', 'giant-nine');
                tile.style.display = 'flex';
                const vid = tile.querySelector('video');
                if (vid) {
                    vid.playbackRate = 1.0;
                    if (vid.paused) vid.play().catch(() => {});
                }
            });

            if (action.type === 'ECHO') {
                let tilesToEcho = [...allTiles];
                shuffleArray(tilesToEcho);
                
                const minPercent = 0.65;
                const maxPercent = 1.00;
                const randomCurve = Math.pow(Math.random(), 2);
                const chosenPercentage = minPercent + randomCurve * (maxPercent - minPercent);
                const targetCount = Math.floor(tilesToEcho.length * chosenPercentage);

                tilesToEcho.forEach((tile, index) => {
                    if (index < targetCount) { 
                        tile.dataset.pendingEchoSrc = action.echoSrc;
                    }
                });
                wasLastLayoutGiant = false;
                lastGiantIndex = -1;
            } 
            else if (action.type === 'GIANT_NINE') {
                const targetGiantTile = allTiles[0];
                targetGiantTile.classList.add('giant-nine');
                wasLastLayoutGiant = true;
                lastGiantIndex = -1;

                const giantVid = targetGiantTile.querySelector('video');
                if (giantVid) giantVid.playbackRate = 0.2;

                let hiddenCount = 0;
                let remainingTiles = [];

                allTiles.forEach(tile => {
                    if (tile !== targetGiantTile) {
                        if (hiddenCount < 8) {
                            tile.style.display = 'none';
                            hiddenCount++;
                        } else {
                            remainingTiles.push(tile); 
                        }
                    }
                });

                gridContainer.innerHTML = '';
                if (Math.random() < 0.5) {
                    gridContainer.appendChild(targetGiantTile);
                    remainingTiles.forEach(tile => gridContainer.appendChild(tile));
                } else {
                    remainingTiles.forEach(tile => gridContainer.appendChild(tile));
                    gridContainer.appendChild(targetGiantTile);
                }
            } 
            else if (action.type === 'GIANT_2X2') {
                const targetGiantTile = allTiles[0];
                targetGiantTile.classList.add('giant');

                let attempts = 0;
                do {
                    shuffleArray(allTiles);
                } while (allTiles.indexOf(targetGiantTile) === lastGiantIndex && wasLastLayoutGiant && attempts++ < 10);

                lastGiantIndex = allTiles.indexOf(targetGiantTile);
                wasLastLayoutGiant = true;

                let hiddenCount = 0;
                for (let i = 0; i < allTiles.length; i++) {
                    if (allTiles[i] !== targetGiantTile) {
                        if (hiddenCount < 3) {
                            allTiles[i].style.display = 'none';
                            hiddenCount++;
                        }
                    }
                }

                gridContainer.innerHTML = '';
                allTiles.forEach(tile => gridContainer.appendChild(tile));
            } 
            else if (action.type === 'RESET_UNIFORM') {
                wasLastLayoutGiant = false;
                lastGiantIndex = -1;
                
                shuffleArray(allTiles);
                gridContainer.innerHTML = '';
                allTiles.forEach(tile => gridContainer.appendChild(tile));
            }
        }

        for (let i = 0; i < maxTilesUniform; i++) {
            const tile = createTileElement();
            allTiles.push(tile);
            gridContainer.appendChild(tile);
        }
    </script>
</body>
</html>
