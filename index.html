<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPEG test patterns</title>
    <script src="videos.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .collage-container {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            padding: 4px;
        }
        .tile {
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* Standard 2x2 Giant Modifier */
        .tile.giant {
            grid-column: span 2;
            grid-row: span 2;
        }
        
        /* Left-Oriented Takeover */
        .layout-nine-left .tile.giant-nine {
            grid-column: 1 / span 3;
            grid-row: 1 / span 3;
        }
        .layout-nine-left .tile.small-sidebar {
            grid-column: 4;
            grid-row: span 1;
        }

        /* Right-Oriented Takeover */
        .layout-nine-right .tile.giant-nine {
            grid-column: 2 / span 3;
            grid-row: 1 / span 3;
        }
        .layout-nine-right .tile.small-sidebar {
            grid-column: 1;
            grid-row: span 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>
<body>

    <div class="collage-container" id="grid"></div>

    <script>
        // =========================================================================
        // 🎛️ ARTWORK CONFIGURATION PANEL
        // =========================================================================
        const CONFIG = {
            videoDirectory: 'videos/',       
            maxTilesUniform: 12,              
            triggerEveryXChanges: 15,         
            maxInitialOffsetSeconds: 5,       
            
            // Playback Speed Configuration
            enableVariableSpeeds: true,       
            
            // SKEW DIALS: Higher numbers = stronger preference for target speed
            normalTileSkewExponent: 3.0,
            nineCellTileSkewExponent: 2.0,
            echoCurve: 0.2,
            
            // Core Probability Modifiers (values between 0.0 and 1.0)
            echoTakeoverChance: 0.9,         
            giantLayoutChance: 0.7,          
            nineCellTakeoverChance: 0.05,      
                        
            echoMinPercent: 0.5,             
            echoMaxPercent: 1.00,             
            
            loopDurationCutoffSeconds: 5.0,   
            loopProbabilities: {
                play2: 0.80,                  
                play3: 0.70,                  
                play4: 0.60,                  
                play5: 0.50                   
            }
        };

        // =========================================================================
        // ⚙️ SYSTEM STATES & CONTROLLERS
        // =========================================================================
        const gridContainer = document.getElementById('grid');
        let allTiles = []; 
        let changeCounter = 0;
        let currentLayoutType = 'UNIFORM'; 
        let lastGiantIndex = -1;
        let pendingLayoutChange = null; 

        function getRandomVideo() {
            const randomIndex = Math.floor(Math.random() * videoSourcePool.length);
            return CONFIG.videoDirectory + videoSourcePool[randomIndex];
        }

        // Calculates continuous mathematical curves using exponents from the CONFIG block
        function assignRandomPlaybackSpeed(videoElement, forceSkewSlow = false) {
            if (!CONFIG.enableVariableSpeeds) {
                videoElement.playbackRate = 1.0;
                return;
            }
            
            const seed = Math.random();
            let chosenSpeed;

            if (forceSkewSlow) {
                // Anchors heavily toward 0.5x, using the nine-cell configuration dial
                chosenSpeed = 0.5 + 0.5 * Math.pow(seed, CONFIG.nineCellTileSkewExponent);
            } else {
                // Anchors heavily toward 1.0x, using the normal tile configuration dial
                chosenSpeed = 1.0 - 0.5 * Math.pow(seed, CONFIG.normalTileSkewExponent);
            }

            videoElement.playbackRate = parseFloat(chosenSpeed.toFixed(2));
        }

        function createTileElement() {
            const tile = document.createElement('div');
            tile.className = 'tile';
            
            const video = document.createElement('video');
            video.muted = true;
            video.autoplay = true;
            video.playsInline = true;
            
            video.src = getRandomVideo();
            assignRandomPlaybackSpeed(video, false); 
            
            let loopCounter = 1;

            video.addEventListener('loadedmetadata', function() {
                const randomStart = Math.random() * Math.min(CONFIG.maxInitialOffsetSeconds, this.duration);
                this.currentTime = randomStart;
            }, { once: true });

            video.addEventListener('ended', function() {
                if (this.duration < CONFIG.loopDurationCutoffSeconds) {
                    let shouldLoop = false;
                    const probs = CONFIG.loopProbabilities;
                    
                    if (loopCounter === 1 && Math.random() < probs.play2) shouldLoop = true; 
                    else if (loopCounter === 2 && Math.random() < probs.play3) shouldLoop = true; 
                    else if (loopCounter === 3 && Math.random() < probs.play4) shouldLoop = true; 
                    else if (loopCounter === 4 && Math.random() < probs.play5) shouldLoop = true; 

                    if (shouldLoop) {
                        loopCounter++;
                        this.currentTime = 0; 
                        this.play().catch(() => {});
                        return; 
                    }
                }

                loopCounter = 1;
                const isGiantTile = tile.classList.contains('giant') || tile.classList.contains('giant-nine');

                if (tile.dataset.pendingEchoSrc) {
                    this.src = tile.dataset.pendingEchoSrc;
                    delete tile.dataset.pendingEchoSrc;
                } else {
                    this.src = getRandomVideo();
                }
                
                // Keep the slow or standard skew active when video cycles naturally
                assignRandomPlaybackSpeed(this, tile.classList.contains('giant-nine'));
                this.play().catch(e => console.log("Playback error:", e));

                if (isGiantTile) {
                    changeCounter = 0; 
                    generateNextLayoutAction(); 
                } else {
                    changeCounter++;
                    if (changeCounter >= CONFIG.triggerEveryXChanges) {
                        changeCounter = 0; 
                        generateNextLayoutAction(); 
                    }
                }

                if (pendingLayoutChange) {
                    executeQueuedLayout(pendingLayoutChange);
                    pendingLayoutChange = null; 
                }
            });

            tile.appendChild(video);
            return tile;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function generateNextLayoutAction() {
            // Mandate structural changes when stepping away from specialized containers
            if (currentLayoutType === 'GIANT_NINE') {
                if (Math.random() < 0.5) {
                    pendingLayoutChange = { type: 'RESET_UNIFORM' };
                } else {
                    pendingLayoutChange = { type: 'GIANT_2X2' };
                }
                return;
            }

            if (currentLayoutType === 'GIANT_2X2') {
                if (Math.random() < 0.5) {
                    pendingLayoutChange = { type: 'RESET_UNIFORM' };
                } else {
                    pendingLayoutChange = { type: 'ECHO', echoSrc: getRandomVideo() };
                }
                return;
            }

            if (Math.random() < CONFIG.echoTakeoverChance) {
                pendingLayoutChange = { type: 'ECHO', echoSrc: getRandomVideo() };
            } else if (Math.random() < CONFIG.giantLayoutChance) {
                if (Math.random() < CONFIG.nineCellTakeoverChance) {
                    pendingLayoutChange = { type: 'GIANT_NINE' }; 
                } else {
                    pendingLayoutChange = { type: 'GIANT_2X2' };
                }
            } else {
                pendingLayoutChange = { type: 'RESET_UNIFORM' };
            }
        }

        function executeQueuedLayout(action) {
            // Safe class list wiping: preserves ongoing video buffers completely
            gridContainer.className = 'collage-container';
            
            allTiles.forEach(tile => {
                tile.className = 'tile'; 
                tile.style.display = 'flex';
                const vid = tile.querySelector('video');
                if (vid && vid.paused) vid.play().catch(() => {});
            });

            if (action.type === 'ECHO') {
                let tilesToEcho = [...allTiles];
                shuffleArray(tilesToEcho);
                
                const randomCurve = Math.pow(Math.random(), CONFIG.echoCurve);
                const chosenPercentage = CONFIG.echoMinPercent + randomCurve * (CONFIG.echoMaxPercent - CONFIG.echoMinPercent);
                const targetCount = Math.floor(tilesToEcho.length * chosenPercentage);

                tilesToEcho.forEach((tile, index) => {
                    if (index < targetCount) { 
                        tile.dataset.pendingEchoSrc = action.echoSrc;
                    }
                });
                lastGiantIndex = -1;
            } 
            else if (action.type === 'GIANT_NINE') {
                const targetGiantTile = allTiles[0];
                targetGiantTile.classList.add('giant-nine');
                lastGiantIndex = -1;

                // Adjust the speed of the focal element using the slow skew formula immediately upon transition
                const giantVid = targetGiantTile.querySelector('video');
                if (giantVid) assignRandomPlaybackSpeed(giantVid, true);

                let hiddenCount = 0;
                let remainingTiles = [];

                allTiles.forEach(tile => {
                    if (tile !== targetGiantTile) {
                        if (hiddenCount < 8) {
                            tile.style.display = 'none';
                            hiddenCount++;
                        } else {
                            tile.classList.add('small-sidebar');
                            remainingTiles.push(tile); 
                        }
                    }
                });

                // Safe structure updates without resetting elements
                if (Math.random() < 0.5) {
                    gridContainer.classList.add('layout-nine-left');
                    gridContainer.appendChild(targetGiantTile);
                    remainingTiles.forEach(tile => gridContainer.appendChild(tile));
                } else {
                    gridContainer.classList.add('layout-nine-right');
                    remainingTiles.forEach(tile => gridContainer.appendChild(tile));
                    gridContainer.appendChild(targetGiantTile);
                }
            } 
            else if (action.type === 'GIANT_2X2') {
                const targetGiantTile = allTiles[0];
                targetGiantTile.classList.add('giant');

                let attempts = 0;
                do {
                    shuffleArray(allTiles);
                } while (allTiles.indexOf(targetGiantTile) === lastGiantIndex && currentLayoutType === 'GIANT_2X2' && attempts++ < 10);

                lastGiantIndex = allTiles.indexOf(targetGiantTile);

                let hiddenCount = 0;
                for (let i = 0; i < allTiles.length; i++) {
                    if (allTiles[i] !== targetGiantTile) {
                        if (hiddenCount < 3) {
                            allTiles[i].style.display = 'none';
                            hiddenCount++;
                        }
                    }
                }

                allTiles.forEach(tile => gridContainer.appendChild(tile));
            } 
            else if (action.type === 'RESET_UNIFORM') {
                lastGiantIndex = -1;
                shuffleArray(allTiles);
                allTiles.forEach(tile => gridContainer.appendChild(tile));
            }

            currentLayoutType = action.type;
        }

        for (let i = 0; i < CONFIG.maxTilesUniform; i++) {
            const tile = createTileElement();
            allTiles.push(tile);
            gridContainer.appendChild(tile);
        }
    </script>
</body>
</html>
