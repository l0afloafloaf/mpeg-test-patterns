<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPEG test patterns</title>
    <script src="videos.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .collage-container {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            padding: 4px;
        }
        .tile {
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .tile.giant {
            grid-column: span 2;
            grid-row: span 2;
        }
        
        /* Fixed Grid Coordinates for the 9-Cell Takeover Layout */
        .tile.giant-nine {
            grid-row: 1 / span 3;
        }
        .tile.giant-left {
            grid-column: 1 / span 3;
        }
        .tile.giant-right {
            grid-column: 2 / span 3;
        }
        .tile.small-sidebar {
            grid-column: span 1;
            grid-row: span 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>
<body>

    <div class="collage-container" id="grid"></div>

    <script>
        // =========================================================================
        // 🎛️ ARTWORK CONFIGURATION PANEL
        // =========================================================================
        const CONFIG = {
            // Folder Path Adjustments
            videoDirectory: 'videos/',       // Folder where your video collection lives
            
            // Layout Evolution Intervals
            maxTilesUniform: 12,              // Standard grid capacity (Do not change for 4x3 grid)
            triggerEveryXChanges: 15,         // Number of normal video switches before a new layout rolls
            
            // Random Start Timing Caps
            maxInitialOffsetSeconds: 5,       // Maximum seconds a video can skip forward on startup
            
            // Core Probability Modifiers (values between 0.0 and 1.0)
            echoTakeoverChance: 0.30,         // 30% chance for an Echo event on layout change
            giantLayoutChance: 0.60,          // 60% chance to mutate layout if Echo doesn't hit
            nineCellTakeoverChance: 0.1,      // 10% chance for ninecell
            
            // Echo Fill Distribution Variables
            echoMinPercent: 0.6,             // Minimum percentage of tiles to flood during Echo
            echoMaxPercent: 1.00,             // Maximum percentage of tiles to flood during Echo
            
            // Fine-Tuning Multi-Tier Clip Looping Rules
            loopDurationCutoffSeconds: 5.0,   // Videos shorter than this qualify for stutter loops
            loopProbabilities: {
                play2: 0.90,                  // 90% chance to loop a 2nd time
                play3: 0.70,                  // 70% chance to loop a 3rd time
                play4: 0.50,                  // 50% chance to loop a 4th time
                play5: 0.30                   // 30% chance to loop a 5th time
            }
        };

        // =========================================================================
        // ⚙️ SYSTEM STATES & CONTROLLERS (Core Mechanics)
        // =========================================================================
        const gridContainer = document.getElementById('grid');
        let allTiles = []; 
        let changeCounter = 0;
        let wasLastLayoutGiant = false;
        let lastGiantIndex = -1;
        let pendingLayoutChange = null; // Memory queue mapping future structural layouts

        function getRandomVideo() {
            const randomIndex = Math.floor(Math.random() * videoSourcePool.length);
            return CONFIG.videoDirectory + videoSourcePool[randomIndex];
        }

        function createTileElement() {
            const tile = document.createElement('div');
            tile.className = 'tile';
            
            const video = document.createElement('video');
            video.muted = true;
            video.autoplay = true;
            video.playsInline = true;
            
            video.src = getRandomVideo();
            let loopCounter = 1;

            video.addEventListener('loadedmetadata', function() {
                const randomStart = Math.random() * Math.min(CONFIG.maxInitialOffsetSeconds, this.duration);
                this.currentTime = randomStart;
            }, { once: true });

            video.addEventListener('ended', function() {
                // Multi-tiered looping mechanics processing block
                if (this.duration < CONFIG.loopDurationCutoffSeconds) {
                    let shouldLoop = false;
                    const probs = CONFIG.loopProbabilities;
                    
                    if (loopCounter === 1 && Math.random() < probs.play2) shouldLoop = true; 
                    else if (loopCounter === 2 && Math.random() < probs.play3) shouldLoop = true; 
                    else if (loopCounter === 3 && Math.random() < probs.play4) shouldLoop = true; 
                    else if (loopCounter === 4 && Math.random() < probs.play5) shouldLoop = true; 

                    if (shouldLoop) {
                        loopCounter++;
                        this.currentTime = 0; 
                        this.play().catch(() => {});
                        return; // Halt process here to execute loop within this frame asset
                    }
                }

                loopCounter = 1;

                // Check if this specific tile is currently acting as a Giant asset
                const isGiantTile = tile.classList.contains('giant') || tile.classList.contains('giant-nine');

                // Process Echo queue updates first if applicable
                if (tile.dataset.pendingEchoSrc) {
                    this.src = tile.dataset.pendingEchoSrc;
                    delete tile.dataset.pendingEchoSrc;
                } else {
                    this.src = getRandomVideo();
                }
                this.play().catch(e => console.log("Playback error:", e));

                // Smart Layout Triggering Rule:
                // If a giant video finishes its run, instantly force a new layout transformation.
                if (isGiantTile) {
                    changeCounter = 0; 
                    generateNextLayoutAction(); 
                } else {
                    changeCounter++;
                    if (changeCounter >= CONFIG.triggerEveryXChanges) {
                        changeCounter = 0; 
                        generateNextLayoutAction(); 
                    }
                }

                // THE QUEUE COMMAND DEPLOYMENT: Enforces structural alterations to wait for ends of streams
                if (pendingLayoutChange) {
                    executeQueuedLayout(pendingLayoutChange);
                    pendingLayoutChange = null; 
                }
            });

            tile.appendChild(video);
            return tile;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function generateNextLayoutAction() {
            // Anti-Repetition Rule: If the last layout was a Giant variety, force a structural mix up
            if (wasLastLayoutGiant) {
                if (Math.random() < 0.5) {
                    pendingLayoutChange = { type: 'RESET_UNIFORM' };
                } else {
                    pendingLayoutChange = { type: 'ECHO', echoSrc: getRandomVideo() };
                }
                return;
            }

            if (Math.random() < CONFIG.echoTakeoverChance) {
                pendingLayoutChange = { type: 'ECHO', echoSrc: getRandomVideo() };
            } else if (Math.random() < CONFIG.giantLayoutChance) {
                if (Math.random() < CONFIG.nineCellTakeoverChance) {
                    pendingLayoutChange = { type: 'GIANT_NINE' }; 
                } else {
                    pendingLayoutChange = { type: 'GIANT_2X2' };
                }
            } else {
                pendingLayoutChange = { type: 'RESET_UNIFORM' };
            }
        }

        function executeQueuedLayout(action) {
            // Wipes ALL layout modifications clean so nothing gets stuck on a layout reset
            allTiles.forEach(tile => {
                tile.className = 'tile'; 
                tile.style.display = 'flex';
                const vid = tile.querySelector('video');
                if (vid) {
                    vid.playbackRate = 1.0;
                    if (vid.paused) vid.play().catch(() => {});
                }
            });

            if (action.type === 'ECHO') {
                let tilesToEcho = [...allTiles];
                shuffleArray(tilesToEcho);
                
                const randomCurve = Math.pow(Math.random(), 2);
                const chosenPercentage = CONFIG.echoMinPercent + randomCurve * (CONFIG.echoMaxPercent - CONFIG.echoMinPercent);
                const targetCount = Math.floor(tilesToEcho.length * chosenPercentage);

                tilesToEcho.forEach((tile, index) => {
                    if (index < targetCount) { 
                        tile.dataset.pendingEchoSrc = action.echoSrc;
                    }
                });
                wasLastLayoutGiant = false;
                lastGiantIndex = -1;
            } 
            else if (action.type === 'GIANT_NINE') {
                const targetGiantTile = allTiles[0];
                targetGiantTile.classList.add('giant-nine');
                wasLastLayoutGiant = true;
                lastGiantIndex = -1;

                const giantVid = targetGiantTile.querySelector('video');
                if (giantVid) giantVid.playbackRate = 0.5;

                let hiddenCount = 0;
                let remainingTiles = [];

                allTiles.forEach(tile => {
                    if (tile !== targetGiantTile) {
                        if (hiddenCount < 8) {
                            tile.style.display = 'none';
                            hiddenCount++;
                        } else {
                            tile.classList.add('small-sidebar');
                            remainingTiles.push(tile); 
                        }
                    }
                });

                gridContainer.innerHTML = '';
                if (Math.random() < 0.5) {
                    targetGiantTile.classList.add('giant-left');
                    gridContainer.appendChild(targetGiantTile);
                    remainingTiles.forEach(tile => gridContainer.appendChild(tile));
                } else {
                    targetGiantTile.classList.add('giant-right');
                    remainingTiles.forEach(tile => gridContainer.appendChild(tile));
                    gridContainer.appendChild(targetGiantTile);
                }
            } 
            else if (action.type === 'GIANT_2X2') {
                const targetGiantTile = allTiles[0];
                targetGiantTile.classList.add('giant');

                let attempts = 0;
                do {
                    shuffleArray(allTiles);
                } while (allTiles.indexOf(targetGiantTile) === lastGiantIndex && wasLastLayoutGiant && attempts++ < 10);

                lastGiantIndex = allTiles.indexOf(targetGiantTile);
                wasLastLayoutGiant = true;

                let hiddenCount = 0;
                for (let i = 0; i < allTiles.length; i++) {
                    if (allTiles[i] !== targetGiantTile) {
                        if (hiddenCount < 3) {
                            allTiles[i].style.display = 'none';
                            hiddenCount++;
                        }
                    }
                }

                gridContainer.innerHTML = '';
                allTiles.forEach(tile => gridContainer.appendChild(tile));
            } 
            else if (action.type === 'RESET_UNIFORM') {
                wasLastLayoutGiant = false;
                lastGiantIndex = -1;
                
                shuffleArray(allTiles);
                gridContainer.innerHTML = '';
                allTiles.forEach(tile => gridContainer.appendChild(tile));
            }
        }

        // Initialize standard grid components instantly
        for (let i = 0; i < CONFIG.maxTilesUniform; i++) {
            const tile = createTileElement();
            allTiles.push(tile);
            gridContainer.appendChild(tile);
        }
    </script>
</body>
</html>
